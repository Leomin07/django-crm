{% extends 'base.html' %}

{% block content %}
  <form action="post">
    <div class="uk-fieldset">
      <legend>Edit Todo</legend>
    </div>

    <div class="uk-margin">
      <input type="text" placeholder="Title" aria-label="title" class="uk-input" value="{{ todo.title }}" />
    </div>

    <div class="uk-margin">
      <label for="">Completed</label>
      <input class="uk-checkbox" type="checkbox" aria-label="Checkbox" value="{{ todo.is_completed }}" />
    </div>

    <button class="uk-button uk-button-primary">Login</button>
  </form>
{% endblock %}
